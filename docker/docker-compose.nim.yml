  #   ports:
  #     - "8080:8080"
  #   environment:
  #     NVIDIA_API_KEY: ${NIM_API_KEY}
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #
  # nim-rerank:
  #   image: nvcr.io/nim/nvidia/nv-rerankqa-mistral-4b-v3:latest
  #   ports:
  #     - "8081:8080"
  #   environment:
  #     NVIDIA_API_KEY: ${NIM_API_KEY}
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #
  # nim-examiner:
