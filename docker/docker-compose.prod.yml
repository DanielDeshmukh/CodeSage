services:
  # ─── Vector Database ───────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__HTTP_PORT: 6333
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── PostgreSQL ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: codesage
      POSTGRES_USER: codesage
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codesage_dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codesage"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── NIM Embedding (nvidia/llama-nemotron-embed-1b-v2) ─────────────
  # Requires: NVIDIA GPU with 4GB+ VRAM
  nim-embed:
    image: nvcr.io/nim/nvidia/llama-nemotron-embed-1b-v2:latest
    ports:
      - "8080:8080"
    environment:
      NVIDIA_API_KEY: ${NIM_API_KEY}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ─── NIM Reranking (nvidia/llama-nemotron-rerank-1b-v2) ───────────
  # Requires: NVIDIA GPU with 4GB+ VRAM
  nim-rerank:
    image: nvcr.io/nim/nvidia/llama-nemotron-rerank-1b-v2:latest
    ports:
      - "8081:8080"
    environment:
      NVIDIA_API_KEY: ${NIM_API_KEY}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ─── NIM Examiner — Super 49B (nvidia/llama-nemotron-super-49b-v1) ─
  # Requires: NVIDIA GPU with 24GB+ VRAM (A100/H100 recommended)
  nim-examiner:
    image: nvcr.io/nim/nvidia/llama-nemotron-super-49b-v1:latest
    ports:
      - "8082:8080"
    environment:
      NVIDIA_API_KEY: ${NIM_API_KEY}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ─── NIM Safety (nvidia/nemotron-3.5-content-safety) ──────────────
  # Requires: NVIDIA GPU with 8GB+ VRAM
  nim-safety:
    image: nvcr.io/nim/nvidia/nemotron-3.5-content-safety:latest
    ports:
      - "8083:8080"
    environment:
      NVIDIA_API_KEY: ${NIM_API_KEY}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ─── NIM Scorer — Reward 340B (nvidia/nemotron-4-340b-reward) ─────
  # Requires: NVIDIA GPU with 40GB+ VRAM (multi-GPU or H100 recommended)
  nim-scorer:
    image: nvcr.io/nim/nvidia/nemotron-4-340b-reward:latest
    ports:
      - "8084:8080"
    environment:
      NVIDIA_API_KEY: ${NIM_API_KEY}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  qdrant_data:
    driver: local
  postgres_data:
    driver: local
